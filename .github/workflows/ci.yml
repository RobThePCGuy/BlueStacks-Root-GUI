name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Lint: flake8 "must-fix" set (real syntax errors, undefined names,
      # invalid literal comparisons) plus unused-import detection. Kept lean
      # so the gate is green and meaningful without forcing a full reformat.
      # pywin32 is Windows-only; ruff does not import the code, so this is
      # safe to run on the Linux runner.
      - name: Ruff lint
        run: ruff check --select E9,F63,F7,F82,F401 .

      # Compile check: catches syntax errors across every module. compileall
      # compiles without importing, so the Windows-only pywin32 import in
      # registry_handler.py does not break this on ubuntu.
      - name: Compile check
        run: python -m compileall -q .

  test:
    # conftest.py's autouse fixture monkeypatches registry_handler at import
    # time, and admin.py imports ctypes.wintypes -- both Windows-only, so the
    # suite needs a real Windows runner and can't join the `verify` job above.
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest
